openapi: 3.0.0
info:
  title: Herz Flow API (Mock)
  description: API simulada para o sistema Herz Flow
  version: 1.0.0
servers:
  - url: http://localhost:8080/api
    description: Servidor Local (Mock)

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    User:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        email:
          type: string
        role:
          type: string
          enum: [ADMIN_SISTEMA, ADMIN_EMPRESA, ADMIN_SETOR, OPERADOR]
        companyId:
          type: string
    
    LoginCredentials:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password

    AuthResponse:
      type: object
      properties:
        user:
          $ref: '#/components/schemas/User'
        token:
          type: string

paths:
  /auth/login:
    post:
      summary: Autenticação de usuário
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginCredentials'
      responses:
        '200':
          description: Login realizado com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          description: Credenciais inválidas

  /auth/register:
    post:
      summary: Registro de novo usuário (Mock)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/User'
                - type: object
                  properties:
                    password:
                      type: string
      responses:
        '201':
          description: Usuário criado com sucesso

  /companies:
    get:
      summary: Listar empresas
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Lista de empresas
    post:
      summary: Criar empresa
      security:
        - bearerAuth: []
      responses:
        '201':
          description: Empresa criada

  /users:
    get:
      summary: Listar usuários
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Lista de usuários
    post:
      summary: Criar usuário (Hierárquico)
      security:
        - bearerAuth: []
      responses:
        '201':
          description: Usuário criado

  /contracts:
    get:
      summary: Listar contratos
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Lista de contratos
