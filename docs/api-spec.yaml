openapi: 3.0.0
info:
  title: Herz Flow API
  description: API de autenticação e gestão de usuários para o sistema Herz Flow.
  version: 1.0.0
servers:
  - url: /api
    description: Proxy de desenvolvimento (Vite)
  - url: http://72.60.142.80:9588
    description: Backend

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    UserRole:
      type: string
      enum: [ADMIN_SISTEMA, ADMIN_EMPRESA]
    
    User:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        email:
          type: string
        role:
          $ref: '#/components/schemas/UserRole'
        companyId:
          type: string
        sectorId:
          type: string
    
    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8

    AuthResponse:
      type: object
      properties:
        token:
          type: string
        user:
          $ref: '#/components/schemas/User'

paths:
  /cadastro/adminempresa:
    post:
      summary: Atualizar usuário (adminempresa)
      description: |
        Atualiza dados de usuário e vínculo com empresa.

        Senha é opcional: se `senhaAtual`/`senhaNova` não forem enviados (ou forem vazios), a senha atual é preservada.

        Para alterar a senha, envie `senhaAtual` e `senhaNova` preenchidos.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            examples:
              semSenha:
                summary: Atualização sem trocar senha
                value:
                  cnpj: "34432780000160"
                  Usuario:
                    id: "51395c9d-22be-4b3c-89d4-2402bf8a50fd"
                    nome: "Nome"
                    login: "flavia"
                    email: "flavia_rita_brito@fenix.com.br"
                    cpf: "89127496333"
                    datanascimento: "1996-05-04"
                    aceiteLGPD: true
                    tipoUsuario: 2
                    telefones: []
                    enderecos: []
              comSenha:
                summary: Atualização com troca de senha
                value:
                  cnpj: "34432780000160"
                  Usuario:
                    id: "51395c9d-22be-4b3c-89d4-2402bf8a50fd"
                    login: "flavia"
                    senhaAtual: "SenhaAtual@123"
                    senhaNova: "SenhaNova@1234!"
      responses:
        "200":
          description: Atualização realizada
        "400":
          description: Erro de validação
        "401":
          description: Não autorizado
        "500":
          description: Erro interno

  /auth/login:
    post:
      summary: Autenticar usuário
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login realizado com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          description: Credenciais inválidas

  /auth/register:
    post:
      summary: Cadastrar novo usuário
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                email:
                  type: string
                password:
                  type: string
                role:
                  $ref: '#/components/schemas/UserRole'
      responses:
        '201':
          description: Usuário criado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'

  /users:
    get:
      summary: Listar usuários
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: role
          schema:
            $ref: '#/components/schemas/UserRole'
        - in: query
          name: companyId
          schema:
            type: string
      responses:
        '200':
          description: Lista de usuários
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'

  /companies:
    post:
      summary: Cadastrar empresa
      security:
        - bearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                legalName:
                  type: string
                cnpj:
                  type: string
      responses:
        '201':
          description: Empresa criada

  /contracts/templates:
    post:
      summary: Criar template de contrato
      security:
        - bearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                content:
                  type: string
      responses:
        '201':
          description: Template salvo
